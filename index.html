<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VICONSYS | Under Construction</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0f172a;
      --accent: #0284c7;
      --accent-light: #e0f2fe;
      --text-main: #334155;
      --text-light: #475569;
      --white: #ffffff;
      --bg-light: #f8fafc;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-light); /* Plain light background */
      color: var(--text-main);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      text-align: center;
      padding: 20px;
    }

    h1, h2, h3 { 
      font-family: 'Manrope', sans-serif; 
      font-weight: 700; 
    }

    .container {
      max-width: 800px;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Logo Styling */
    .brand-logo {
      max-width: 250px;
      height: auto;
      margin-bottom: 40px;
      animation: fadeInDown 1s cubic-bezier(0.5,0,0,1) forwards;
    }

    .hero-label { 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      font-size: 14px; 
      color: var(--accent); 
      font-weight: 600; 
      margin-bottom: 15px; 
      display: block; 
    }

    .container h1 { 
      font-size: clamp(36px, 5vw, 56px); 
      line-height: 1.2; 
      margin-bottom: 25px; 
      color: var(--primary); 
    }

    .container p.subtitle { 
      font-size: 18px; 
      opacity: 0.9; 
      margin-bottom: 50px; 
      font-weight: 300; 
      color: var(--text-light);
      max-width: 600px;
    }

    /* Contact Card */
    .contact-card {
      background: var(--white);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 24px;
      padding: 30px 40px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 500px;
      animation: fadeInUp 1s cubic-bezier(0.5,0,0,1) forwards;
      animation-delay: 0.2s;
      opacity: 0;
    }

    .contact-card h3 {
      font-size: 20px;
      margin-bottom: 20px;
      color: var(--primary);
    }

    .contact-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .contact-item:last-child {
      margin-bottom: 0;
    }

    .contact-item span {
      color: var(--accent);
      font-weight: 600;
    }

    .contact-item a {
      color: var(--text-main);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .contact-item a:hover {
      color: var(--accent);
    }

    footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: var(--text-light);
      z-index: 2;
    }

    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .reveal { 
      opacity: 0; 
      animation: fadeInUp 1s cubic-bezier(0.5,0,0,1) forwards;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Logo -->
    <img src="Vishesh Construction Systems logo light COMING SOON PAGE.png" alt="VICONSYS Logo" class="brand-logo">

    <div class="reveal">
      <span class="hero-label">Coming Soon</span>
      
      <p class="subtitle">
        We are currently upgrading our digital presence. Our new website is under development and will be launched soon.
      </p>
    </div>

    <!-- Contact Details -->
    <div class="contact-card">
      <h3>Get in Touch</h3>
      <div class="contact-item">
        <span>Phone:</span> 
        <a href="tel:+919049965111">9049965111</a>
      </div>
      <div class="contact-item">
        <span>Email:</span> 
        <a href="mailto:desk.viconsys@gmail.com">desk.viconsys@gmail.com</a>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2026 VISHESH CONSTRUCTION SYSTEMS</p>
  </footer>

</body>
</html>
